services:
  - type: web
    name: sparklewash
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn car_wash.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render generates a secure random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: ADMIN_DASHBOARD_URL
        value: "https://sparklewash.onrender.com/admin-panel/"
      - key: DATABASE_URL
        fromDatabase:
          name: sparklewash-db
          property: connectionString
      # Add your email credentials in the Render dashboard → Environment
      # - key: EMAIL_HOST_USER
      # - key: EMAIL_HOST_PASSWORD

databases:
  - name: sparklewash-db
    databaseName: sparklewash
    user: sparklewash
    plan: free
