services:
  - type: web
    name: sparklewash
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn car_wash.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render generates a secure random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SITE_URL
        value: "https://sparklewash.onrender.com"
      - key: ADMIN_DASHBOARD_URL
        value: "https://sparklewash.onrender.com/panel/"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://sparklewash.onrender.com"
      - key: EMAIL_HOST_USER
        value: "pramilatmg.np@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        sync: false   # Set this secret in the Render dashboard → Environment
      - key: DATABASE_URL
        fromDatabase:
          name: sparklewash-db
          property: connectionString

databases:
  - name: sparklewash-db
    databaseName: sparklewash
    user: sparklewash
    plan: free
