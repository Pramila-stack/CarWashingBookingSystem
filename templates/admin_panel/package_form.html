{% extends 'base.html' %}
{% block title %}{{ action }} Package — SparkleWash Admin{% endblock %}

{% block content %}
<div class="page-wrap admin-wrap">
  <div class="admin-header">
    <div class="container">
      <div class="page-header-inner">
        <div>
          <p class="page-eyebrow"><a href="{% url 'admin_packages' %}" style="color:inherit;opacity:.7">Packages</a> / {{ action }}</p>
          <h1 class="page-title">{{ action }} Service Package</h1>
        </div>
        <a href="{% url 'admin_packages' %}" class="btn btn-outline">← Cancel</a>
      </div>
    </div>
  </div>

  <div class="container" style="padding-top:2.5rem;padding-bottom:4rem">
    <div class="form-page-card">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label>Package Name <span class="label-req">*</span></label>
          <input type="text" name="name" value="{{ pkg.name|default:'' }}" placeholder="e.g. Premium Wash" required>
        </div>
        <div class="form-group">
          <label>Description <span class="label-req">*</span></label>
          <textarea name="description" rows="4" placeholder="What's included in this package…" required>{{ pkg.description|default:'' }}</textarea>
        </div>
        <div class="form-group">
          <label>Price (USD) <span class="label-req">*</span></label>
          <input type="number" name="price" value="{{ pkg.price|default:'' }}" step="0.01" min="0" placeholder="0.00" required>
        </div>
        <div style="display:flex;gap:1rem;margin-top:.5rem">
          <button type="submit" class="btn btn-primary">{{ action }} Package</button>
          <a href="{% url 'admin_packages' %}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
